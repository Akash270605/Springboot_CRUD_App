spring:
  application:
    name: crud-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:cruddb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
  flyway:
    enabled: true
  h2:
    console:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-256-bits-long}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
